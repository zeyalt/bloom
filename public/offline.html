<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fffcf9;
      color: #1a1410;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #0f1410;
        color: #f5f1ed;
      }
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 10px;
      font-family: "Sora", sans-serif;
      letter-spacing: -0.02em;
    }
    p {
      color: #6b6359;
      line-height: 1.6;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    @media (prefers-color-scheme: dark) {
      p { color: #a89980; }
    }
    .btn {
      background: #d4895c;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 300ms ease-out;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .info {
      margin-top: 40px;
      padding: 20px;
      background: #f9f6f3;
      border-radius: 16px;
      font-size: 0.9rem;
      color: #6b6359;
    }
    @media (prefers-color-scheme: dark) {
      .info {
        background: #1a2422;
        color: #a89980;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Bloom is syncing your data when you reconnect. Previously loaded data is available in the app.</p>
    <button class="btn" onclick="window.location.reload()">Reload Page</button>
    <div class="info">
      <p>💡 Tip: Your activity data is saved locally. When your connection returns, changes will sync automatically.</p>
    </div>
  </div>
</body>
</html>
